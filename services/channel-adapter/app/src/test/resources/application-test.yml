spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

app:
  meta:
    app-secret: test-app-secret-for-hmac-validation
    verify-token: test-verify-token
    api-version: v21.0
    api-base-url: https://graph.facebook.com
  encryption:
    key: test-encryption-key-32-bytes-ok!
  services:
    inbox-url: http://localhost:8082
    auth-url: http://localhost:8080
