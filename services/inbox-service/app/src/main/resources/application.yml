server:
  port: ${PORT:8082}
  tomcat:
    max-http-form-post-size: 1MB
    max-swallow-size: 1MB
    max-http-post-size: 1048576

spring:
  application:
    name: inbox-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/inbox}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method

app:
  services:
    channel-adapter-url: ${CHANNEL_ADAPTER_URL:http://localhost:8081}
    ai-engine-url: ${AI_ENGINE_URL:http://localhost:8083}
    auth-url: ${AUTH_SERVICE_URL:http://localhost:8080}
    service-api-key: ${SERVICE_API_KEY:}
  outbound:
    queue-prefix: outbound
    poll-interval-ms: 200
    batch-size: 4
    max-retries: 3
