name: CI

on:
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      auth-service: ${{ steps.filter.outputs.auth-service }}
      channel-adapter: ${{ steps.filter.outputs.channel-adapter }}
      inbox-service: ${{ steps.filter.outputs.inbox-service }}
      ai-engine: ${{ steps.filter.outputs.ai-engine }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            channel-adapter:
              - 'services/channel-adapter/**'
            inbox-service:
              - 'services/inbox-service/**'
            ai-engine:
              - 'services/ai-engine/**'
            web:
              - 'services/web/**'

  auth-service:
    name: Auth Service (Java)
    needs: changes
    if: needs.changes.outputs.auth-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew assemble

      - name: Run tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-test-results
          path: services/auth-service/app/build/reports/tests/test/

  channel-adapter:
    name: Channel Adapter (Java)
    needs: changes
    if: needs.changes.outputs.channel-adapter == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/channel-adapter
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew assemble

      - name: Run tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: channel-adapter-test-results
          path: services/channel-adapter/app/build/reports/tests/test/

  inbox-service:
    name: Inbox Service (Java)
    needs: changes
    if: needs.changes.outputs.inbox-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/inbox-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew assemble

      - name: Run tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inbox-service-test-results
          path: services/inbox-service/app/build/reports/tests/test/

  ai-engine:
    name: AI Engine (Python)
    needs: changes
    if: needs.changes.outputs.ai-engine == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Check project
        run: poetry check

  web:
    name: Web (Next.js)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
